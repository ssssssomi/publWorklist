<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>edu-history 샘플</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ── 리셋 & 기본 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff;
      color: #222;
    }
    img { display: block; max-width: 100%; }

    /* ══════════════════════════════════════
       기존 페이지 틀 (헤더 ~ 컨텐츠 타이틀)
       — 이미 만들어진 영역이라 가정
    ══════════════════════════════════════ */

    /* 헤더 */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: #d9d9d9;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #555;
      letter-spacing: 0.04em;
    }
    body {
      padding-top: 64px;
    }

    /* 컨텐츠 상단 배너 */
    .content-top {
      background: #cecece;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #555;
    }

    /* 컨텐츠 타이틀 */
    .content-title {
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #555;
    }

    /* ══════════════════════════════════════
       edu-history 타임라인 컴포넌트 CSS
    ══════════════════════════════════════ */

    .edu-history {
      padding: 0 0 120px;
    }

    .edu-history__list {
      position: relative;
      max-width: 700px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* 세로 라인 */
    .edu-history__line {
      position: absolute;
      left: 158px; /* padding(40) + year(100) + dot-wrap 절반(20) - 2 */
      top: 0;
      bottom: 0;
      width: 1px;
      background: #e0e0e0;
    }

    /* 아이템 */
    .edu-history__item {
      display: flex;
      align-items: flex-start;
      padding-bottom: 72px;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.65s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .edu-history__item.is-visible {
      opacity: 1;
      transform: translateY(0);
    }
    .edu-history__item:last-child {
      padding-bottom: 0;
    }

    /* 연도 */
    .edu-history__year {
      width: 100px;
      padding-top: 2px;
      flex-shrink: 0;
      font-size: 13px;
      color: #999;
      text-align: right;
      line-height: 1.4;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* 점 래퍼 */
    .edu-history__dot-wrap {
      width: 40px;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding-top: 7px;
    }
    .edu-history__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4A6CF7;
      flex-shrink: 0;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }
    /* 스크롤로 뷰포트 상단에 가장 가까울 때 활성화 */
    .edu-history__item.is-active .edu-history__dot {
      transform: scale(1.6);
      box-shadow: 0 0 0 5px rgba(74, 108, 247, 0.18);
    }

    /* 콘텐츠 */
    .edu-history__content {
      flex: 1;
    }
    .edu-history__title {
      font-size: 14px;
      color: #333;
      line-height: 1.7;
      margin: 0 0 16px;
      font-weight: 400;
      word-break: keep-all;
    }

    /* 이미지 */
    .edu-history__img {
      width: 220px;
      height: 165px;
      border-radius: 4px;
      overflow: hidden;
      background: #e8e8e8;
    }
    .edu-history__img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .edu-history__item:hover .edu-history__img img {
      transform: scale(1.04);
    }

  </style>
</head>
<body>

  <!-- ── 기존 틀: 헤더 ── -->
  <header class="header">헤더</header>

  <!-- ── 기존 틀: 컨텐츠 상단 ── -->
  <section class="content-top">컨텐츠 상단</section>

  <!-- ── 기존 틀: 컨텐츠 타이틀 ── -->
  <section class="content-title">컨텐츠 타이틀</section>

  <!-- ══════════════════════════════════════
       .edu-history 컴포넌트 영역 시작
  ══════════════════════════════════════ -->
  <div class="edu-history">
    <div class="edu-history__list">

      <div class="edu-history__line" aria-hidden="true"></div>

      <div class="edu-history__item">
        <div class="edu-history__year">2025</div>
        <div class="edu-history__dot-wrap">
          <div class="edu-history__dot"></div>
        </div>
        <div class="edu-history__content">
          <p class="edu-history__title">디지털 혁신 특별 프로그램 수료 및 우수상 수상</p>
          <div class="edu-history__img">
            <img src="https://picsum.photos/seed/2025/440/330" alt="2025 수료 이미지">
          </div>
        </div>
      </div>

      <div class="edu-history__item">
        <div class="edu-history__year">2024</div>
        <div class="edu-history__dot-wrap">
          <div class="edu-history__dot"></div>
        </div>
        <div class="edu-history__content">
          <p class="edu-history__title">UX 디자인 심화 과정 이수 및 현장 실습 완료</p>
          <div class="edu-history__img">
            <img src="https://picsum.photos/seed/2024/440/330" alt="2024 실습 이미지">
          </div>
        </div>
      </div>

      <div class="edu-history__item">
        <div class="edu-history__year">2022</div>
        <div class="edu-history__dot-wrap">
          <div class="edu-history__dot"></div>
        </div>
        <div class="edu-history__content">
          <p class="edu-history__title">프론트엔드 개발 부트캠프 6개월 과정 수료</p>
          <div class="edu-history__img">
            <img src="https://picsum.photos/seed/2022/440/330" alt="2022 부트캠프 이미지">
          </div>
        </div>
      </div>

      <div class="edu-history__item">
        <div class="edu-history__year">2019</div>
        <div class="edu-history__dot-wrap">
          <div class="edu-history__dot"></div>
        </div>
        <div class="edu-history__content">
          <p class="edu-history__title">웹 디자인 기초 과정 입학 및 포트폴리오 제작 시작</p>
          <div class="edu-history__img">
            <img src="https://picsum.photos/seed/2019/440/330" alt="2019 입학 이미지">
          </div>
        </div>
      </div>

      <div class="edu-history__item">
        <div class="edu-history__year">1999</div>
        <div class="edu-history__dot-wrap">
          <div class="edu-history__dot"></div>
        </div>
        <div class="edu-history__content">
          <p class="edu-history__title">컴퓨터 그래픽스 전공 학사 학위 취득</p>
          <div class="edu-history__img">
            <img src="https://picsum.photos/seed/1999/440/330" alt="1999 졸업 이미지">
          </div>
        </div>
      </div>

    </div>
  </div>
  <!-- .edu-history 컴포넌트 영역 끝 -->


  <!-- ── JS ── -->
  <script>
    var Global = Global || {};

    Global.uiHistoryStyle = (function () {

      var _observer = null;
      var _scrollHandler = null;
      var _items = [];

      function init(selector, threshold) {
        selector  = selector  || '.edu-history__item';
        threshold = threshold !== undefined ? threshold : 0.15;

        _items = Array.prototype.slice.call(document.querySelectorAll(selector));
        if (!_items.length) return;

        /* ── 1. 페이드인 IntersectionObserver ── */
        if (!('IntersectionObserver' in window)) {
          _items.forEach(function (el) { el.classList.add('is-visible'); });
        } else {
          _observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
                _observer.unobserve(entry.target);
              }
            });
          }, { threshold: threshold });

          _items.forEach(function (el) { _observer.observe(el); });
        }

        /* ── 2. 스크롤 → 뷰포트 상단에 가장 가까운 아이템 dot 활성화 ── */
        _scrollHandler = function () {
          /* 헤더 높이 동적으로 계산 (fixed 헤더 selector를 실제 프로젝트에 맞게 수정) */
          var headerEl = document.querySelector('.header');
          var headerHeight = headerEl ? headerEl.offsetHeight : 0;

          var closest = null;
          var closestDist = Infinity;

          _items.forEach(function (el) {
            var dotWrap = el.querySelector('.edu-history__dot-wrap');
            if (!dotWrap) return;
            /* dot의 뷰포트 기준 Y - 헤더 높이를 뺀 기준점과의 거리 */
            var dotTop = dotWrap.getBoundingClientRect().top - headerHeight;
            var dist = Math.abs(dotTop);
            if (dist < closestDist) {
              closestDist = dist;
              closest = el;
            }
          });

          _items.forEach(function (el) {
            if (el === closest) {
              el.classList.add('is-active');
            } else {
              el.classList.remove('is-active');
            }
          });
        };

        /* ── 3. 마지막 dot이 헤더 기준선까지 올라올 수 있도록 하단 여백 동적 추가 ── */
        function setBottomPadding() {
          var headerEl = document.querySelector('.header');
          var headerHeight = headerEl ? headerEl.offsetHeight : 0;
          var lastItem = _items[_items.length - 1];
          if (!lastItem) return;

          var lastDot = lastItem.querySelector('.edu-history__dot-wrap');
          if (!lastDot) return;

          /* 뷰포트 높이에서 헤더를 뺀 만큼을 .edu-history 하단 여백으로 설정
             → 마지막 dot이 헤더 바로 아래 기준선까지 스크롤될 수 있게 됨 */
          var extra = window.innerHeight - headerHeight;
          var container = document.querySelector('.edu-history');
          if (container) {
            container.style.paddingBottom = extra + 'px';
          }
        }

        setBottomPadding();
        window.addEventListener('resize', setBottomPadding, { passive: true });

        window.addEventListener('scroll', _scrollHandler, { passive: true });
        _scrollHandler(); /* 초기 실행 */
      }

      function destroy() {
        if (_observer) { _observer.disconnect(); _observer = null; }
        if (_scrollHandler) { window.removeEventListener('scroll', _scrollHandler); _scrollHandler = null; }
        _items = [];
      }

      return { init: init, destroy: destroy };
    }());

    /* 페이지 init */
    document.addEventListener('DOMContentLoaded', function () {
      Global.uiHistoryStyle.init();
    });
  </script>

</body>
</html>
